<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Siswa Kreatif</title>
    <!-- Google Fonts untuk font yang lebih keren -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Warna Gradasi Ungu-Biru */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.9); /* Efek Putih Transparan */
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #764ba2;
            padding: 3px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 { font-size: 22px; color: #4834d4; margin-bottom: 5px; }
        .sub-text { font-size: 14px; color: #777; margin-bottom: 20px; font-weight: 300; }

        .info-section {
            text-align: left;
            background: #f9f9ff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .info-item { font-size: 13px; margin-bottom: 8px; }
        .info-item b { color: #667eea; }

        .social-btn {
            display: inline-block;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ganti link gambar di bawah dengan foto kamu -->
        <img src="foto.JPG" alt="Foto Profil" class="profile-img">
        
        <h1>IIN KURNIAWATI</h1>
        <p class="sub-text">Siswa SMK KOMPUTAMA MAJENANG- Jurusan TJKT</p>

        <div class="info-section">
            <div class="info-item"><b>🏫 Sekolah:</b> SMK KOMPUTAMA MAJENANG</div>
            <div class="info-item"><b>🪑
kelas:</b> XII TJKT4</div>
            <div class="info-item"><b>🏸
Hobi:</b> Badminton</div>
            <div class="info-item"><b>💉 Cita-cita:</b> Perawat</div>
        </div>

        <a href="https://www.instagram.com/niiaaa_316?igsh=MWZwcGJtOWxrOWFnbw==" target="_blank" class="social-btn">
            Follow Instagram
        </a>
    </div>

</body>
</html>
